# Regenerate the Chaos Viewer atlas data (chaos-db.json on the chaos-data
# branch) from committed data whenever matches land on main, so the hosted
# viewer's modules and percentages update on their own. details/ chunks on the
# branch are preserved (they need the ROM; refreshed by local regens).
name: update-chaos-data

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "nearmiss/**"
      - "tools/chaos_db_ci.py"
      - "tools/chaosviewer.config.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chaos-data
  cancel-in-progress: true

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: per-function authors come from git log
      - uses: actions/checkout@v4
        with:
          ref: chaos-data
          path: _chaos_data
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate chaos-db.json
        run: python tools/chaos_db_ci.py --out _chaos_data/chaos-db.json
      - name: Push if changed
        run: |
          cd _chaos_data
          if git diff --quiet -- chaos-db.json; then
            echo "no data change"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chaos-db.json
          git commit -m "Refresh Chaos Viewer data from $(git -C .. rev-parse --short HEAD)"
          git push origin chaos-data
